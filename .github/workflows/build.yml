name: Build Docker Image
on:
  push:
    branches: [main, development]
permissions:
  packages: write
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "IMAGE_OWNER_LC=$(echo ${{ secrets.GHCR_USERNAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Debug GHCR auth context
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHRC_TOKEN: ${{ secrets.GHRC_TOKEN }}
        run: |
          echo "GitHub actor: ${{ github.actor }}"
          echo "Repo owner (lowercase): ${IMAGE_OWNER_LC}"
          echo "Target image: ghcr.io/${IMAGE_OWNER_LC}/deepend-api"

          if [ -z "$GHCR_USERNAME" ]; then
            echo "ERROR: GHCR_USERNAME secret is empty or missing"
            exit 1
          fi

          if [ -z "$GHRC_TOKEN" ]; then
            echo "ERROR: GHRC_TOKEN secret is empty or missing"
            exit 1
          fi

          user_status=$(curl -sS -o /tmp/gh_user.json -w "%{http_code}" \
            -H "Authorization: Bearer $GHRC_TOKEN" \
            https://api.github.com/user)
          echo "GitHub API /user status: ${user_status}"

          repo_status=$(curl -sS -o /tmp/gh_repo.json -w "%{http_code}" \
            -H "Authorization: Bearer $GHRC_TOKEN" \
            "https://api.github.com/repos/${IMAGE_OWNER_LC}/deepend-api")
          echo "GitHub API repo access status: ${repo_status}"

          token_scope_response=$(curl -sS -u "$GHCR_USERNAME:$GHRC_TOKEN" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${IMAGE_OWNER_LC}/deepend-api:push,pull")

          if echo "$token_scope_response" | grep -q '"token"'; then
            echo "GHCR scope check: push/pull scope granted"
          else
            echo "GHCR scope check: push/pull scope NOT granted"
            echo "Registry response: $token_scope_response"
          fi
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHRC_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/deepend-api:latest
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/deepend-api:${{ github.sha }}
  # On development branch deploy to render
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Deploy to Render (development)
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
  # On main branch deploy to prod
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy application
        env:
          DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}
          DEPLOY_APPLICATION_ID: ${{ secrets.DEPLOY_APPLICATION_ID }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          curl -f -X POST "$DEPLOY_URL" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${DEPLOY_API_KEY}" \
            -d "{\"applicationId\":\"${DEPLOY_APPLICATION_ID}\"}"
